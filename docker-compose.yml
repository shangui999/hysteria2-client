services:
  hy2:
    image: ghcr.io/shangui999/hysteria2-client:latest
    container_name: hysteria2-client
    restart: always
    environment:
      - HY2_URI=hysteria2://YOUR_PASSWORD@YOUR_SERVER:PORT?sni=example.com&insecure=0&mport=50000-60000#name
      - HY2_SOCKS_PORT=10808
      - HY2_HTTP_PORT=10809
    ports:
      - "10808:10808"
      - "10809:10809"
